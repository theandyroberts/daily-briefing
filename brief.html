<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andy's Daily Intelligence Brief</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --text-faint: #484f58;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --orange: #f0883e;
      --cyan: #39d353;
      --accent: #1f6feb;
      --callout-bg: #1c2333;
      --callout-border: #2d5a88;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-dim);
    }

    .timestamp {
      font-size: 0.85rem;
      color: var(--text-faint);
      margin-top: 8px;
    }

    /* Nav bar */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .nav-bar.top {
      margin-bottom: 24px;
    }

    .nav-bar.bottom {
      margin-top: 32px;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px;
      min-width: 80px;
    }

    .nav-link:hover {
      color: var(--text);
    }

    .nav-link.prev { text-align: left; }
    .nav-link.next { text-align: right; }

    .nav-link.disabled {
      color: var(--text-faint);
      cursor: default;
      pointer-events: none;
    }

    .nav-date {
      color: var(--text-dim);
      font-weight: 600;
      text-align: center;
      flex: 1;
    }

    /* Section styles */
    .section {
      margin-bottom: 48px;
    }

    .section-header {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .section-headline {
      font-size: 1rem;
      color: var(--yellow);
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-title a {
      color: var(--text);
      text-decoration: none;
    }

    .card-title a:hover {
      color: var(--blue);
    }

    .card-body {
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .card-tip {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--cyan);
      font-weight: 500;
    }

    .card-tip::before {
      content: '> ';
      font-weight: 700;
    }

    /* Tags / badges */
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .tag-model { background: #1c3a5f; color: var(--blue); }
    .tag-paper { background: #2d1f4e; color: var(--purple); }
    .tag-china { background: #4a1d1d; color: var(--red); }
    .tag-xai { background: #3d2a10; color: var(--orange); }

    /* Callout boxes */
    .callout {
      background: var(--callout-bg);
      border: 1px solid var(--callout-border);
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      padding: 16px 20px;
      margin-top: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.6;
    }

    .callout-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--blue);
      margin-bottom: 4px;
      font-weight: 700;
    }

    /* Tesla / SpaceX / xAI compact row */
    .trio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .trio-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .trio-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-faint);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .trio-price {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .trio-change {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .trio-change.positive { color: var(--green); }
    .trio-change.negative { color: var(--red); }

    .trio-note {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* Movie cards */
    .movie-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .verdict {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 12px;
      flex-shrink: 0;
      width: 52px;
      text-align: center;
    }

    .verdict-watch { background: #1a3a1a; color: var(--green); }
    .verdict-skip { background: #3a1a1a; color: var(--red); }
    .verdict-wait { background: #3a2e10; color: var(--yellow); }

    .movie-info { flex: 1; }

    .movie-title {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .movie-platform {
      font-size: 0.78rem;
      color: var(--text-faint);
      margin-left: 8px;
    }

    .movie-note {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Marketing tool badge */
    .tool-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--orange);
      background: #3d2a10;
      padding: 2px 8px;
      border-radius: 12px;
      margin-top: 8px;
    }

    /* Macro section — compact */
    .macro-section {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .macro-header {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .macro-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .macro-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .macro-ticker {
      color: var(--text-faint);
      font-weight: 600;
    }

    .macro-price {
      font-weight: 700;
    }

    .macro-change {
      font-weight: 600;
      font-size: 0.8rem;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }

    .macro-mood {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 8px;
      font-style: italic;
    }

    .macro-friday {
      font-size: 0.85rem;
      color: var(--orange);
      margin-top: 6px;
      font-weight: 600;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0 24px;
      color: var(--text-faint);
      font-size: 0.8rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text-dim);
      font-size: 1.1rem;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .container { padding: 20px 16px; }
      header h1 { font-size: 1.5rem; }
      .section-header { font-size: 1.15rem; }
      .trio-grid { grid-template-columns: 1fr; }
      .trio-price { font-size: 1.1rem; }
      .movie-card { flex-direction: column; align-items: flex-start; gap: 8px; }
      .macro-row { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Andy's Daily Intelligence Brief</h1>
      <div class="subtitle">AI research, agents, and things worth knowing</div>
      <div class="timestamp" id="gen-time"></div>
    </header>

    <div class="nav-bar top" id="nav-top"></div>

    <div id="content">
      <div class="loading">Loading brief</div>
    </div>

    <div class="nav-bar bottom" id="nav-bottom"></div>

    <footer>Generated by Rusty</footer>
  </div>

  <script>
    // --- Nav helpers ---
    function prevWeekday(d) {
      const r = new Date(d);
      r.setDate(r.getDate() - 1);
      while (r.getDay() === 0 || r.getDay() === 6) r.setDate(r.getDate() - 1);
      return r;
    }

    function nextWeekday(d) {
      const r = new Date(d);
      r.setDate(r.getDate() + 1);
      while (r.getDay() === 0 || r.getDay() === 6) r.setDate(r.getDate() + 1);
      return r;
    }

    function fmtShort(d) {
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtFull(d) {
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    function dateStr(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function todayET() {
      // Get today's date in ET
      const now = new Date();
      const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      return new Date(et.getFullYear(), et.getMonth(), et.getDate());
    }

    // --- Extract date from URL ---
    function getPageDate() {
      const path = window.location.pathname;
      const match = path.match(/(\d{4}-\d{2}-\d{2})/);
      if (match) {
        const parts = match[1].split('-');
        return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      }
      return null;
    }

    function renderNav(containerId, pageDate) {
      const today = todayET();
      const prev = prevWeekday(pageDate);
      const next = nextWeekday(pageDate);
      const nextIsToday = dateStr(next) === dateStr(today);
      const nextIsFuture = next > today;

      let prevHtml = `<a class="nav-link prev" href="${dateStr(prev)}.html">&larr; ${fmtShort(prev)}</a>`;
      let centerHtml = `<span class="nav-date">${fmtShort(pageDate)}, ${pageDate.getFullYear()}</span>`;
      let nextHtml;

      if (nextIsToday) {
        nextHtml = `<a class="nav-link next" href="../">Today &rarr;</a>`;
      } else if (nextIsFuture) {
        nextHtml = `<span class="nav-link next disabled">${fmtShort(next)} &rarr;</span>`;
      } else {
        nextHtml = `<a class="nav-link next" href="${dateStr(next)}.html">${fmtShort(next)} &rarr;</a>`;
      }

      document.getElementById(containerId).innerHTML = prevHtml + centerHtml + nextHtml;
    }

    // --- Rendering ---
    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function changeCls(pct) {
      return pct >= 0 ? 'positive' : 'negative';
    }

    function changeStr(pct) {
      return (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
    }

    function tagHtml(tag) {
      if (!tag) return '';
      const cls = 'tag-' + tag;
      return `<span class="tag ${cls}">${esc(tag)}</span>`;
    }

    function renderBrief(data) {
      document.getElementById('gen-time').textContent = formatTime(data.generated_at);
      let html = '';

      // 1. AI Research & Models
      const ai = data.ai_research;
      html += `<div class="section">
        <div class="section-header">&#129302; AI Research &amp; Models</div>
        <div class="section-headline">${esc(ai.headline)}</div>`;
      (ai.items || []).forEach(item => {
        const titleContent = item.learn_url
          ? `<a href="${esc(item.learn_url)}" target="_blank" rel="noopener">${esc(item.title)}</a>`
          : esc(item.title);
        html += `<div class="card">
          <div class="card-title">${titleContent} ${tagHtml(item.tag)}</div>
          <div class="card-body">${esc(item.body)}</div>
        </div>`;
      });
      if (ai.learn_today) {
        html += `<div class="callout">
          <div class="callout-label">Learn Today</div>
          ${esc(ai.learn_today)}
        </div>`;
      }
      html += `</div>`;

      // 2. OpenClaw & AI Agents
      const oc = data.openclaw_agents;
      html += `<div class="section">
        <div class="section-header">&#129438; OpenClaw &amp; AI Agents</div>
        <div class="section-headline">${esc(oc.headline)}</div>`;
      (oc.items || []).forEach(item => {
        html += `<div class="card">
          <div class="card-title">${esc(item.title)}</div>
          <div class="card-body">${esc(item.body)}</div>
          ${item.try_this ? `<div class="card-tip">${esc(item.try_this)}</div>` : ''}
        </div>`;
      });
      if (oc.try_today) {
        html += `<div class="callout">
          <div class="callout-label">Try Today</div>
          ${esc(oc.try_today)}
        </div>`;
      }
      html += `</div>`;

      // 3. Tesla / SpaceX / xAI
      const tsx = data.tesla_spacex_xai;
      html += `<div class="section">
        <div class="section-header">&#128640; Tesla / SpaceX / xAI</div>
        <div class="trio-grid">
          <div class="trio-card">
            <div class="trio-label">Tesla</div>
            <div class="trio-price">$${tsx.tesla.price.toFixed(2)}</div>
            <div class="trio-change ${changeCls(tsx.tesla.change_pct)}">${changeStr(tsx.tesla.change_pct)}</div>
            <div class="trio-note">${esc(tsx.tesla.note)}</div>
          </div>
          <div class="trio-card">
            <div class="trio-label">SpaceX</div>
            <div class="trio-note" style="margin-top:8px">${esc(tsx.spacex)}</div>
          </div>
          <div class="trio-card">
            <div class="trio-label">xAI</div>
            <div class="trio-note" style="margin-top:8px">${esc(tsx.xai)}</div>
          </div>
        </div>
      </div>`;

      // 4. Movies & Streaming
      const movies = data.movies;
      html += `<div class="section">
        <div class="section-header">&#127916; Movies &amp; Streaming</div>`;
      (movies.items || []).forEach(m => {
        const vcls = 'verdict-' + (m.verdict || 'wait');
        html += `<div class="movie-card">
          <span class="verdict ${vcls}">${esc(m.verdict)}</span>
          <div class="movie-info">
            <div><span class="movie-title">${esc(m.title)}</span><span class="movie-platform">${esc(m.platform)}</span></div>
            <div class="movie-note">${esc(m.note)}</div>
          </div>
        </div>`;
      });
      html += `</div>`;

      // 5. Marketing Automation
      const mkt = data.marketing;
      html += `<div class="section">
        <div class="section-header">&#128227; Marketing Automation</div>`;
      (mkt.items || []).forEach(item => {
        html += `<div class="card">
          <div class="card-title">${esc(item.title)}</div>
          <div class="card-body">${esc(item.body)}</div>
          ${item.tool ? `<span class="tool-badge">${esc(item.tool)}</span>` : ''}
        </div>`;
      });
      html += `</div>`;

      // 6. Macro / Markets / Crypto
      const mc = data.macro;
      html += `<div class="macro-section">
        <div class="macro-header">&#128201; Macro / Markets / Crypto</div>
        <div class="macro-row">
          <div class="macro-item"><span class="macro-ticker">SPY</span> <span class="macro-price">$${mc.spy.price.toFixed(2)}</span> <span class="macro-change ${changeCls(mc.spy.change_pct)}">${changeStr(mc.spy.change_pct)}</span></div>
          <div class="macro-item"><span class="macro-ticker">TSLA</span> <span class="macro-price">$${mc.tsla.price.toFixed(2)}</span> <span class="macro-change ${changeCls(mc.tsla.change_pct)}">${changeStr(mc.tsla.change_pct)}</span></div>
          <div class="macro-item"><span class="macro-ticker">LMND</span> <span class="macro-price">$${mc.lmnd.price.toFixed(2)}</span> <span class="macro-change ${changeCls(mc.lmnd.change_pct)}">${changeStr(mc.lmnd.change_pct)}</span></div>
          <div class="macro-item"><span class="macro-ticker">BTC</span> <span class="macro-price">$${mc.btc.price.toLocaleString()}</span> <span class="macro-change ${changeCls(mc.btc.change_pct)}">${changeStr(mc.btc.change_pct)}</span></div>
        </div>
        <div class="macro-mood">${esc(mc.mood)}</div>
        ${mc.btc_friday_note ? `<div class="macro-friday">&#8383; ${esc(mc.btc_friday_note)}</div>` : ''}
      </div>`;

      document.getElementById('content').innerHTML = html;
    }

    // --- Init ---
    const pageDate = getPageDate();
    if (pageDate) {
      renderNav('nav-top', pageDate);
      renderNav('nav-bottom', pageDate);

      const jsonFile = dateStr(pageDate) + '.json';
      fetch(jsonFile + '?t=' + Date.now())
        .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
        .then(data => renderBrief(data))
        .catch(e => {
          document.getElementById('content').innerHTML =
            '<div class="loading" style="animation:none">No brief available for this date.</div>';
        });
    } else {
      document.getElementById('content').innerHTML =
        '<div class="loading" style="animation:none">Could not determine date from URL.</div>';
    }
  </script>
</body>
</html>
