<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Andy's Daily Brief</title>
  <script>
    // Redirect to today's dated brief page
    var d = new Date();
    var et = new Date(d.toLocaleString('en-US', {timeZone: 'America/New_York'}));
    var y = et.getFullYear();
    var m = String(et.getMonth() + 1).padStart(2, '0');
    var day = String(et.getDate()).padStart(2, '0');
    window.location.replace('briefs/' + y + '-' + m + '-' + day + '.html');
  </script>
  <style>
    body { background: #0a0a0f; color: #e6edf3; font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  </style>
</head>
<body>
  <p>Loading today's brief...</p>
</body>
</html>
